# Tunes goconst to flag genuine production-code duplication only.
#
# Rationale: golangci-lint v2.12.2 embeds goconst v1.10.0, whose stricter
# defaults (min-len 3, min-occurrences 3) flag hundreds of test fixtures
# (repeated issuer/endpoint URLs and status literals across table-driven
# OAuth tests) that are not real duplication. Tuning to min-len 5,
# min-occurrences 5 and ignoring tests keeps the linter useful in
# production code without churn from fixtures. Matches the fleet
# convention (see giantswarm/mcp-kubernetes; giantswarm/devctl#1802).
version: "2"
linters:
  settings:
    goconst:
      min-len: 5
      min-occurrences: 5
      ignore-tests: true
  exclusions:
    rules:
      # gosec G101 (hardcoded credentials) and G710 (open redirect) fire on
      # test fixtures -- fake issuer/token metadata and redirect targets in
      # OAuth table-driven tests -- which are not real findings.
      - path: _test\.go
        linters:
          - gosec
